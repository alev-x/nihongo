<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой словарь японского</title>
    <link rel="stylesheet" href="./css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <header class="header">
        <div class="container">
            <h1 class="header__title">Словарь</h1>
            <p class="header__subtitle">Выберите систему письма для изучения</p>    
        </div>
    </header>

        <main class=>
            <div class="alphabet">
                <div class="container">
                    <section>
                        <a href="./alphabet/hiragana.html" class="alphabet__card"  id="hiragana">
                            <h2 class="alphabet__name">Хирагана</h2>
                        </a>
                    </section>
    
                    <section>
                        <a href="./alphabet/katakana.html" class="alphabet__card" id="katakana">
                            <h2 class="alphabet__name">Катакана</h2>
                        </a>
                    </section>
    
                    <section>
                        <a href="./alphabet/kanji.html" class="alphabet__card" id="kanji">
                            <h2 class="alphabet__name">Кандзи</h2>
                        </a>
                    </section>
                    <section>
                        <a href="test.html" class="alphabet__card" id="test">
                            <h2 class="alphabet__name">📖 Тест (невыученные)</h2>
                        </a>
                    </section>
                </div>
            </div>
            <div class="search">
                <div class="container">
                    <input type="text" id="searchInput" placeholder="Введите слово для поиска...">
                    <button id="searchBtn">Найти</button>
                </div>
            </div>
        </main>

        <footer>
            <div class="container">
                <p class="footer-note">Создано с любовью для изучения японского языка</p>
            </div>
        </footer>
    
    <script src="./js/allData.js"></script>
    <script src="./js/search_main.js"></script>
    
</body>
</html>
